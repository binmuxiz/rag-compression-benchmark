# ── Global Paths ────────────────────────────────────────────────────────
model2path:
  e5: "intfloat/e5-base-v2"
  llama3-8B: "/app/models/Llama-3.1-8B-Instruct"   # 방금 다운로드한 경로로 변경

model2pooling:
  e5: "mean"

# index_path는 CLI --index_path 로 주입되므로 여기선 비워둠
method2index: ~

# ── Environment ─────────────────────────────────────────────────────────
data_dir: "/app/dataset/"                          # pod-local 경로
save_dir: "/app/output/"                           # pod-local 경로
gpu_id: "0"

dataset_name: "nq"
split: ["test"]
test_sample_num: ~          # None = full NQ test set (베이스라인은 CLI로 100 권장)
random_sample: False
seed: 2024

save_intermediate_data: True   # RAGAS 후처리에 필요
save_metric_score: True
save_note: "codesign_experiment"
is_reasoning: False

# ── Retrieval ────────────────────────────────────────────────────────────
retrieval_method: "e5"
corpus_path: "/app/indexes/wiki18_100w.jsonl"      # pod-local
retrieval_topk: 5
retrieval_batch_size: 256
retrieval_use_fp16: True
retrieval_query_max_length: 128
faiss_gpu: False                                   # aarch64/pod 모두 faiss-cpu
silent_retrieval: True

save_retrieval_cache: False
use_retrieval_cache: False

# ── Generator ────────────────────────────────────────────────────────────
framework: "hf"
generator_model: "llama3-8B"
generator_max_input_len: 1024
generator_batch_size: 4

# bf16: Llama 3.1 공식 배포 dtype
generator_params:
  torch_dtype: "bfloat16"

generation_params:
  max_tokens: 32

# ── Evaluation ───────────────────────────────────────────────────────────
# FlashRAG 기본 lexical 메트릭 (sanity check 용)
# RAGAS는 저장된 intermediate_data 기반으로 run_ragas.py 에서 별도 실행
metrics: ["em", "f1", "acc", "precision", "recall"]
metric_setting:
  retrieval_recall_topk: 5