apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: rag-ragas-eunbin-v1
  namespace: p-knu
spec:
  elasticPolicy:
    rdzvId: test
    rdzvBackend: c10d
    minReplicas: 1
    maxReplicas: 1
    nProcPerNode: 1
  runPolicy:
    cleanPodPolicy: None
  pytorchReplicaSpecs:
    Worker:         
      replicas: 1
      #restartPolicy: OnFailure
      restartPolicy: Never
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false" # 필수 설정
        spec:
          imagePullSecrets:
          - name: dockerhub-eunbin
          nodeSelector:
            mlx.navercorp.com/zone: "private-h200-medzero-pt-0"
          containers:
          - name: pytorch
            image: binmuxizj/rag-quant:v1
            imagePullPolicy: Always
            securityContext:
              capabilities:
                add: ["IPC_LOCK"] 
            workingDir: /app
            command: ["sleep"]
            args: ["infinity"]
            env:
            - name: HF_TOKEN
              value: 
            - name: NCCL_DEBUG
              value: INFO
            resources:
              limits:
                memory: "256Gi"
                cpu: 16
                nvidia.com/gpu: 2
              requests:
                memory: "256Gi"
                cpu: 16
                nvidia.com/gpu: 2
            volumeMounts:
            - mountPath: /dev/shm
              name: shared-memory
          volumes:
          - name: shared-memory
            emptyDir:
              medium: Memory
              sizeLimit: "16Gi"